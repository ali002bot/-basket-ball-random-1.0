<html>
<head>
    <meta charset="UTF-8">
    <title>Basket Random Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>


    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #net-indicator {
            position: fixed; top: 5px; left: 5px; z-index: 10000;
            font-family: monospace; font-size: 10px; color: #555;
            background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 3px;
        }
        #net-indicator.connected { color: #0f0; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>
    <div id="net-indicator">Network: Initializing...</div>


    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@1520d90d7b2994737acd8f7a633d018f63c22ca7/box2d.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@1520d90d7b2994737acd8f7a633d018f63c22ca7/offclient.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@1520d90d7b2994737acd8f7a633d018f63c22ca7/main.js" type="module"></script>


    <script>
        // --- CONFIGURATION ---
        const SECRET_ROOM = "ArthurSecretBasket99";
        const indicator = document.getElementById('net-indicator');
        let client;


        // --- AUTO-CONNECT LOGIC ---
        function startConnection() {
            // Connecting to the public broker via Secure WebSockets
            client = mqtt.connect('wss://broker.emqx.io:8083/mqtt');


            client.on('connect', () => {
                client.subscribe(SECRET_ROOM);
                indicator.innerText = "Network: Connected (Room: " + SECRET_ROOM + ")";
                indicator.classList.add('connected');
                console.log("Auto-joined " + SECRET_ROOM);
            });


            client.on('message', (topic, message) => {
                const data = JSON.parse(message.toString());
                // This simulates the key on your screen when the other player presses theirs
                simulateRemoteKey(data.key, data.type);
            });
        }


        // --- KEY SYNC LOGIC ---
        window.addEventListener('keydown', (e) => {
            // Send W (87) and Up Arrow (38) to the other player
            if (client && client.connected) {
                client.publish(SECRET_ROOM, JSON.stringify({
                    key: e.keyCode,
                    type: 'keydown'
                }));
            }
        });


        window.addEventListener('keyup', (e) => {
            if (client && client.connected) {
                client.publish(SECRET_ROOM, JSON.stringify({
                    key: e.keyCode,
                    type: 'keyup'
                }));
            }
        });


        function simulateRemoteKey(keyCode, type) {
            const event = new KeyboardEvent(type, {
                keyCode: keyCode,
                which: keyCode,
                bubbles: true
            });
            document.dispatchEvent(event);
        }


        // Run connection on load
        startConnection();
    </script>
</body>
</html>
